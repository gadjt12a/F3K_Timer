; F3K Timer — PlatformIO Configuration
; Framework: Arduino
;
; [env:wokwi]     — Simulation: ESP32-S3 DevKitC-1 + ILI9341 proxy display
; [env:waveshare] — Real hardware: see docs/HARDWARE_ENV.md

; ── Wokwi simulation ──────────────────────────────────────────────────────────
; Board: ESP32-S3-DevKitC-1 (matches target SoC — LX7 dual-core, PSRAM-aware)
; Display proxy: ILI9341 240×320 via SPI (closest Wokwi part to CO5300 AMOLED)
; SPI pins: SCK=18, MOSI=20, MISO=19, CS=5, DC=2, RST=4  (matches diagram.json)
; Buttons: GPIO16 (A), GPIO17 (B) — proxy for PWR button + swipe gestures
; Audio: stub only — no I2S/ES8311 in sim
; Serial: UART0 via $serialMonitor
[env:wokwi]
platform     = espressif32 @ 6.12.0
board        = esp32-s3-devkitc-1
framework    = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit ILI9341@^1.6.0
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit BusIO@^1.16.1

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DWOKWI_SIM=1
    ; Display geometry — ILI9341 240×320 proxy
    -DDISPLAY_WIDTH=240
    -DDISPLAY_HEIGHT=320
    -DDISPLAY_CX=120
    -DDISPLAY_CY=160
    -DARC_OUTER_RADIUS=110
    -DARC_INNER_RADIUS=95

; ── Waveshare ESP32-S3-Touch-AMOLED-1.75C — real hardware ─────────────────────
[env:waveshare]
platform          = espressif32 @ 6.9.0
board             = esp32-s3-devkitc-1
framework         = arduino
monitor_speed     = 115200
board_build.flash_size        = 16MB
board_build.partitions        = partitions_f3k_ota.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size       = 16MB
platform_packages =
    platformio/framework-arduinoespressif32 @ ~3.20017.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DWAVESHARE_HW=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Display geometry — 466×466 round AMOLED
    -DDISPLAY_WIDTH=466
    -DDISPLAY_HEIGHT=466
    -DDISPLAY_CX=233
    -DDISPLAY_CY=233
    -DARC_OUTER_RADIUS=220
    -DARC_INNER_RADIUS=200

lib_deps =
    moononournation/GFX Library for Arduino@1.4.9
    lewisxhe/XPowersLib@^0.2.7
    lewisxhe/SensorLib@^0.2.2
