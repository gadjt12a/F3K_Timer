; F3K Timer — PlatformIO Configuration
; Framework: Arduino
;
; [env:waveshare] — Real hardware: see docs/HARDWARE_ENV.md
; Wokwi sim retired (session 30) -- config archived locally in archive/wokwi/

; ── Waveshare ESP32-S3-Touch-AMOLED-1.75C — real hardware ─────────────────────
[env:waveshare]
platform          = espressif32 @ 6.9.0
board             = esp32-s3-devkitc-1
framework         = arduino
monitor_speed     = 115200
board_build.flash_size        = 16MB
board_build.partitions        = partitions_f3k_ota.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size       = 16MB
platform_packages =
    platformio/framework-arduinoespressif32 @ ~3.20017.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DWAVESHARE_HW=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Display geometry — 466×466 round AMOLED
    -DDISPLAY_WIDTH=466
    -DDISPLAY_HEIGHT=466
    -DDISPLAY_CX=233
    -DDISPLAY_CY=233
    -DARC_OUTER_RADIUS=220
    -DARC_INNER_RADIUS=200

lib_deps =
    moononournation/GFX Library for Arduino@1.4.9
    lewisxhe/XPowersLib@^0.2.7
    lewisxhe/SensorLib@^0.2.2
